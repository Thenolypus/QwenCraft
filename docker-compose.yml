services:
  minecraft:
    image: itzg/minecraft-server:2026.7.0
    container_name: qwencraft-minecraft
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "VANILLA"
      VERSION: "1.21.11"
      ONLINE_MODE: "FALSE"
      MODE: "survival"
      DIFFICULTY: "normal"
      SPAWN_PROTECTION: "0"
      ENABLE_COMMAND_BLOCK: "false"
      MEMORY: "2G"
      VIEW_DISTANCE: "8"
      SIMULATION_DISTANCE: "6"
    volumes:
      - ./server-data:/data
